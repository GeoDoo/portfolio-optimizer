services:
  - type: web
    name: portfolio-optimizer
    runtime: node
    buildCommand: npm install && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public 2>/dev/null; true
    startCommand: PORT=10000 HOSTNAME=0.0.0.0 node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
